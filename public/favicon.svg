<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d0d1a"/>

  <!-- Client node (top center) — blue -->
  <rect x="11" y="3" width="10" height="5" rx="1.5" fill="#3B82F6"/>
  <!-- Glow -->
  <rect x="11" y="3" width="10" height="5" rx="1.5" fill="#3B82F6" opacity="0.25" filter="url(#glow)"/>

  <!-- Connecting lines client → gateway / service -->
  <line x1="13" y1="8" x2="7" y2="14" stroke="rgba(255,255,255,0.28)" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="19" y1="8" x2="25" y2="14" stroke="rgba(255,255,255,0.28)" stroke-width="1.25" stroke-linecap="round"/>

  <!-- Gateway (left middle) — violet -->
  <rect x="3" y="14" width="9" height="5" rx="1.5" fill="#8B5CF6"/>

  <!-- Service (right middle) — green -->
  <rect x="20" y="14" width="9" height="5" rx="1.5" fill="#22C55E"/>

  <!-- Connecting lines → database -->
  <line x1="7" y1="19" x2="13" y2="24" stroke="rgba(255,255,255,0.22)" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="25" y1="19" x2="19" y2="24" stroke="rgba(255,255,255,0.22)" stroke-width="1.25" stroke-linecap="round"/>

  <!-- Database (bottom center) — amber -->
  <rect x="11" y="24" width="10" height="5" rx="1.5" fill="#F59E0B"/>

  <!-- Animated packet dot -->
  <circle cx="10" cy="12" r="1.5" fill="#ffffff" opacity="0.7"/>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
    </filter>
  </defs>
</svg>
